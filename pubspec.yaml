name: frigoligo
description: Your articles with you
publish_to: "none"

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 3.0.0+42

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # dev & tooling
  equatable: 2.0.8
  flutter_riverpod: 3.3.1
  freezed_annotation: 3.1.0
  get_it: 9.2.1
  go_router: 17.2.3
  intl: any
  l10n_esperanto: 2.0.14
  logging: 1.3.0
  path_provider: 2.1.5
  path_provider_foundation: any
  riverpod_annotation: 3.0.3
  sqlite3: any

  # UI
  adaptive_dialog: 2.8.0
  any_image_view: 1.9.5
  cadanse: 1.6.1
  flutter_form_builder: 10.3.0+2
  flutter_widget_from_html: 0.17.2
  settings_ui: 2.0.2
  webview_flutter: 4.13.1
  webview_flutter_android: any
  webview_flutter_wkwebview: any

  # networking & API
  http: 1.6.0
  json_annotation: 4.11.0

  # data management
  drift: 2.33.0
  drift_flutter: 0.3.0
  shared_preferences: 2.5.5
  shared_preference_app_group: 1.1.1

  # platform integration
  app_links: 6.4.1
  background_fetch: 1.6.2
  device_info_plus: 12.4.0
  language_info_plus: 1.1.0
  neat_periodic_task: 2.0.1
  package_info_plus: 9.0.1
  universal_platform: 1.1.0
  url_launcher: 6.3.2
  share_plus: 12.0.2

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter

  # lints
  custom_lint: 0.8.1
  flutter_lints: 6.0.0
  riverpod_lint: 3.1.3

  # code generation
  build_runner: any
  drift_dev: 2.33.0
  freezed: 3.2.5
  json_serializable: 6.13.2
  riverpod_generator: 3.0.3

  # automated testing
  emulators: 0.7.0
  mocktail: ^1.0.4
  test: ^1.25.8
  pigeon: ^26.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/article.template.html
    - assets/sample-articles.json
    # BEGIN webview-scripts
    - assets/www/
    - assets/www/fonts/
    - assets/www/scripts/
    - assets/www/scripts/highlightjs/
    - assets/www/scripts/highlightjs/styles/
    - assets/www/scripts/mathjax/
    - assets/www/scripts/mathjax/fonts/mathjax-newcm-font/chtml/dynamic/
    - assets/www/scripts/mathjax/fonts/mathjax-newcm-font/chtml/woff2/
    - assets/www/scripts/mermaid/
    - assets/www/styles/
    # END webview-scripts

  fonts:
    - family: Lato
      fonts:
        - asset: assets/www/fonts/Lato-Regular.ttf
        - asset: assets/www/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/www/fonts/Lato-Thin.ttf
          weight: 100
        - asset: assets/www/fonts/Lato-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/www/fonts/Lato-Light.ttf
          weight: 300
        - asset: assets/www/fonts/Lato-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/www/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/www/fonts/Lato-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/www/fonts/Lato-Black.ttf
          weight: 900
        - asset: assets/www/fonts/Lato-BlackItalic.ttf
          weight: 900
          style: italic
    - family: Montserrat
